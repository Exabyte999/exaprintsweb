<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExaPrints — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #e8ff47;
      --accent2: #ff4747;
      --text: #f0f0f0;
      --muted: #666666;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Space Grotesk', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 400;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── LOGIN ── */
    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 52px;
      width: 100%;
      max-width: 420px;
      position: relative;
    }
    .login-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
    }
    .login-logo {
      font-family: var(--font-display);
      font-size: 28px;
      letter-spacing: 3px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .login-logo span { color: var(--accent); }
    .login-sub {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    .login-label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .login-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      padding: 13px 14px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }
    .login-input:focus { border-color: var(--accent); }
    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 15px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .login-btn:hover { background: #d4eb2e; transform: translateY(-2px); }
    .login-error {
      font-size: 12px;
      color: var(--accent2);
      margin-top: 14px;
      display: none;
      letter-spacing: 0.05em;
    }

    /* ── DASHBOARD ── */
    .dashboard { display: none; flex-direction: column; min-height: 100vh; }

    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
    }
    .header-logo {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 3px;
      color: var(--muted);
    }
    .header-logo span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 20px; }
    .header-tag {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--muted); color: var(--text); }

    .main { flex: 1; padding: 48px 40px; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      margin-bottom: 48px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 28px 32px;
    }
    .stat-card-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .stat-card-num {
      font-family: var(--font-display);
      font-size: 52px;
      color: var(--accent);
      line-height: 1;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-label::before { content: ''; width: 24px; height: 1px; background: var(--accent); }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead tr {
      border-bottom: 1px solid var(--border);
    }
    th {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 12px 16px;
      text-align: left;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:hover { background: var(--surface); }
    td {
      padding: 16px 16px;
      color: var(--text);
      vertical-align: middle;
      line-height: 1.4;
    }
    td.muted { color: var(--muted); }
    td a {
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
      border-bottom: 1px solid rgba(232,255,71,0.3);
      transition: border-color 0.2s;
    }
    td a:hover { border-color: var(--accent); }

    .platform-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 9px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .platform-tag.twitch { border-color: #9147ff; color: #9147ff; }
    .platform-tag.youtube { border-color: #ff0000; color: #ff0000; }
    .platform-tag.kick { border-color: #53fc18; color: #53fc18; }

    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--muted);
    }
    .empty-state-num {
      font-family: var(--font-display);
      font-size: 80px;
      color: var(--border);
      line-height: 1;
      margin-bottom: 16px;
    }
    .empty-state p { font-size: 14px; }

    .loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.1em;
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: auto;
      display: block;
      margin-bottom: 16px;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-box">
      <div class="login-logo">EXA<span>PRINTS</span></div>
      <div class="login-sub">Admin Dashboard</div>
      <label class="login-label">Password</label>
      <input type="password" class="login-input" id="passwordInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()" />
      <button class="login-btn" onclick="login()">Access Dashboard</button>
      <div class="login-error" id="loginError">Wrong password. Try again.</div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <header>
      <div class="header-logo">EXA<span>PRINTS</span></div>
      <div class="header-right">
        <div class="header-tag">Admin</div>
        <button class="logout-btn" onclick="logout()">Log Out</button>
      </div>
    </header>

    <div class="main">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-card-label">Total Submissions</div>
          <div class="stat-card-num" id="statTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Most Recent</div>
          <div class="stat-card-num" id="statRecent" style="font-size:18px;padding-top:8px;line-height:1.3;color:var(--text)">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Top Platform</div>
          <div class="stat-card-num" id="statPlatform">—</div>
        </div>
      </div>

      <div class="section-label">All Submissions</div>
      <button class="refresh-btn" onclick="loadSubmissions()">↻ Refresh</button>

      <div class="table-wrap">
        <div class="loading" id="loadingMsg">Loading submissions…</div>
        <table id="subTable" style="display:none">
          <thead>
            <tr>
              <th>Submitted</th>
              <th>Name</th>
              <th>Email</th>
              <th>Stream Link</th>
              <th>Platform</th>
            </tr>
          </thead>
          <tbody id="subBody"></tbody>
        </table>
        <div class="empty-state" id="emptyState" style="display:none">
          <div class="empty-state-num">0</div>
          <p>No submissions yet. Share your site and they'll show up here.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── IMPORTANT: paste your Apps Script URL here ──
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx0umTLhLDJxJmveJGf6i0tiI0JDlBYipQZoWRxvUum2RBXyPi-9Vm2vmjDgmN2R9kM-Q/exec";

    let savedPassword = "";

    function login() {
      const pw = document.getElementById("passwordInput").value;
      if (!pw) return;
      savedPassword = pw;
      // Try fetching with this password — the script will reject if wrong
      document.getElementById("loginError").style.display = "none";
      loadSubmissions(true);
    }

    function logout() {
      savedPassword = "";
      document.getElementById("passwordInput").value = "";
      document.getElementById("dashboard").style.display = "none";
      document.getElementById("loginWrap").style.display = "flex";
    }

    async function loadSubmissions(isLogin = false) {
      try {
        const res = await fetch(`${SCRIPT_URL}?action=getSubmissions&password=${encodeURIComponent(savedPassword)}`);
        const data = await res.json();

        if (data.error === "Wrong password") {
          document.getElementById("loginError").style.display = "block";
          return;
        }

        // Password was correct — show dashboard
        if (isLogin) {
          document.getElementById("loginWrap").style.display = "none";
          document.getElementById("dashboard").style.display = "flex";
        }

        renderSubmissions(data.submissions || []);

      } catch (err) {
        document.getElementById("loadingMsg").textContent = "Failed to load. Check your SCRIPT_URL.";
      }
    }

    function renderSubmissions(subs) {
      document.getElementById("loadingMsg").style.display = "none";

      // Stats
      document.getElementById("statTotal").textContent = subs.length;
      if (subs.length > 0) {
        document.getElementById("statRecent").textContent = subs[0].timestamp || "—";
        const platforms = subs.map(s => s.platform).filter(Boolean);
        const counts = platforms.reduce((acc, p) => { acc[p] = (acc[p]||0)+1; return acc; }, {});
        const top = Object.entries(counts).sort((a,b) => b[1]-a[1])[0];
        document.getElementById("statPlatform").textContent = top ? top[0] : "—";
      }

      if (subs.length === 0) {
        document.getElementById("emptyState").style.display = "block";
        document.getElementById("subTable").style.display = "none";
        return;
      }

      document.getElementById("subTable").style.display = "table";
      document.getElementById("emptyState").style.display = "none";

      const body = document.getElementById("subBody");
      body.innerHTML = subs.map(s => {
        const platform = (s.platform || "").toLowerCase();
        const tagClass = ["twitch","youtube","kick"].includes(platform) ? platform : "";
        const linkDisplay = s.link ? s.link.replace(/^https?:\/\//, "").substring(0, 40) + (s.link.length > 40 ? "…" : "") : "—";
        return `
          <tr>
            <td class="muted">${s.timestamp || "—"}</td>
            <td><strong>${s.name || "—"}</strong></td>
            <td>${s.email ? `<a href="mailto:${s.email}">${s.email}</a>` : "—"}</td>
            <td>${s.link ? `<a href="${s.link}" target="_blank">${linkDisplay}</a>` : "—"}</td>
            <td><span class="platform-tag ${tagClass}">${s.platform || "—"}</span></td>
          </tr>`;
      }).join("");
    }
  </script>

</body>
</html>
